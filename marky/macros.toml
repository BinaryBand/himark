# Himark macros — the single source of truth for named alphabets.
#
# Every entry is a plain text macro: `@name` expands to the Himark source on the
# right, exactly as if the user had typed it. The engine has no built-in
# alphabet knowledge; it only sees the ranges/unions/congruences these expand to.
#
# A bare name (no `@`) is literal text — `{dec}` matches the string "dec",
# `{@d}` matches a decimal digit.

[macros]
# Positional alphabets (ordered — usable as value bounds, e.g. {{@d}..255}).
d = "0..9"
hex = "0..9,a..f"
HEX = "0..9,A..F"
b32 = "0..9,a..v"
B32 = "0..9,A..V"
w = "0..9,a..z,A..Z,_"
b58 = "1..9,A..H,J..N,P..Z,a..k,m..z" # base58: omits 0 O I l
b64 = "A..Z,a..z,0..9,+,/"
# base85 (RFC 1924). Its '{ } < >' members would collide with Himark syntax, so
# they are reached by code-point ranges whose endpoints avoid them: ';..@' spans
# '< = >' and '`..~' spans '{ | } ~'.
b85 = '\!,#..&,(..+,-,0..9,;..@,A..Z,^.._,`..~'

# Code-point ranges (endpoints written as \\u escapes).
ascii = "\u0000..\u007f"
uni = "\u0000..\U0010FFFF"

# Case-fold and whitespace classes (congruence / unions, not value bounds).
# The case-fold letters are enumerated congruence groups wrapped in their own
# brace, so each stays one group-class arm (a..f matched case-insensitively as a
# contiguous run); digits remain a separate, singly-matched union arm.
hexi = "0..9,{{a<->A},{b<->B},{c<->C},{d<->D},{e<->E},{f<->F}}"
b32i = "0..9,{{a<->A},{b<->B},{c<->C},{d<->D},{e<->E},{f<->F},{g<->G},{h<->H},{i<->I},{j<->J},{k<->K},{l<->L},{m<->M},{n<->N},{o<->O},{p<->P},{q<->Q},{r<->R},{s<->S},{t<->T},{u<->U},{v<->V}}"
wi = "0..9,{{a<->A},{b<->B},{c<->C},{d<->D},{e<->E},{f<->F},{g<->G},{h<->H},{i<->I},{j<->J},{k<->K},{l<->L},{m<->M},{n<->N},{o<->O},{p<->P},{q<->Q},{r<->R},{s<->S},{t<->T},{u<->U},{v<->V},{w<->W},{x<->X},{y<->Y},{z<->Z}},_"
s = "\n,\r, ,\t"
