# Himark macros — the single source of truth for named alphabets.
#
# Every entry is a plain text macro: `@name` expands to the Himark source on the
# right, exactly as if the user had typed it. Macros may reference other macros;
# expansion repeats until the text is stable. The engine has no built-in
# alphabet knowledge; it only sees the ranges and congruence classes these
# expand to (`..` is an ordered range, `,` a congruence class).
#
# A bare name (no `@`) is literal text — `{dec}` matches the string "dec",
# `{@d}` matches a decimal digit.

[macros]
# Positional alphabets (ordered — usable as value bounds, e.g. {@d:0..255}).
d = "0..9"
l = "a..z"
u = "A..Z"
# base58: every digit and letter minus the four ambiguous glyphs. Digits, then
# upper, then lower keeps the canonical Bitcoin ordering.
b58 = "{@d},{@u},{@l},!{0,l,I,O}"

# Character sets. @w folds case by enumerating each letter and its capital as one
# congruence class ({a,A}, {b,B}, …), so a letter and its capital share a single
# ordered position. The `,_` adds underscore as a final position.
s = "\n,\r, ,\t"
w = "{{a,A},{b,B},{c,C},{d,D},{e,E},{f,F},{g,G},{h,H},{i,I},{j,J},{k,K},{l,L},{m,M},{n,N},{o,O},{p,P},{q,Q},{r,R},{s,S},{t,T},{u,U},{v,V},{w,W},{x,X},{y,Y},{z,Z}},_"
x = "!@s"

# Derived alphabets — @w sliced to f/v carries the fold along, so hex stays base
# 16 and case-insensitive at once.
hex = "{@d},{@w:..f}"
b32 = "{@d},{@w:..v}"       # RFC 4648 §7
b64 = "{@d},{@l},{@u},+,/"

# Code-point ranges (endpoints written as \\u escapes).
ascii = "\u0000..\u007f"
uni = "\u0000..\U0010FFFF"
# base-256: every byte, an ordered value alphabet (`{@b256:x..y}`). Distinct from
# the `b256` template filter (which re-encodes a value as base-256 bytes).
b256 = "\u0000..\u00ff"

# Advanced rewrites -------------------------------------------------------------
# Structural shortcuts. A text macro (above) is `@name` -> source; a rewrite
# inspects braces and renumbers groups, so it cannot be plain substitution. Each
# rule names a generic tool (himark/parser/rewrites.py) and supplies its
# parameters -- the specifics live here in data, the mechanics in code.

# A self-binding count `[#]` binds the repeat count on the first instance and
# enforces it on the rest: `{ROW[#]}[1..]` unrolls to a free first ROW plus
# repeats bound to it. Bounds around the `#` constrain that count, collapsing
# into the free copy: `[x..#]` (>= x), `[#..y]` (<= y), `[x..#..y]` (in x..y).
[[rewrites]]
tool = "bind_count"

# `{|..}` is concise sugar for "a pipe, repeated any number of times".
[[rewrites]]
tool = "substitute"
find = "{|..}"
into = "{|}[..]"
